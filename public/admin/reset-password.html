<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Getachew Fikadu Raffle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#050807; --bg-card:#0e1d17; --bg-well:#0a0a0a;
    --accent-gold:#f5b731; --accent-gold-deep:#c9860f; --accent-green:#22c55e; --accent-red:#e5484d;
    --text-primary:#f4f6f3; --text-secondary:#8fa197; --text-tertiary:#5d6d64;
    --border:rgba(255,255,255,0.08);
    --font-display:'Space Grotesk', sans-serif; --font-body:'Inter', sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{ background:var(--bg-base); color:var(--text-primary); font-family:var(--font-body); min-height:100vh; }
  .login-wrap{ max-width:360px; margin:80px auto; background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:28px; }
  .login-wrap h1{ font-family:var(--font-display); font-size:20px; margin-bottom:8px; }
  .sub{ font-size:13px; color:var(--text-secondary); margin-bottom:18px; }
  input{ width:100%; background:var(--bg-well); border:1px solid var(--border); border-radius:10px; padding:11px 13px; color:var(--text-primary); font-size:14px; font-family:var(--font-body); margin-bottom:0; }
  label{ display:block; font-size:12px; color:var(--text-secondary); font-weight:600; margin-bottom:5px; }
  button{ cursor:pointer; font-family:var(--font-body); font-weight:700; border:none; border-radius:10px; padding:11px 16px; font-size:13.5px; }
  .btn-gold{ background:linear-gradient(145deg, var(--accent-gold), var(--accent-gold-deep)); color:#241a02; width:100%; margin-top:14px; }
  .err{ color:var(--accent-red); font-size:12.5px; margin-bottom:10px; display:none; }
  .ok{ color:var(--accent-green); font-size:13px; }
  .pw-wrap{ position:relative; margin-bottom:12px; }
  .pw-wrap input{ padding-right:42px; }
  .pw-toggle{ position:absolute; right:6px; top:0; bottom:0; display:flex; align-items:center; justify-content:center; width:32px; background:none; border:none; padding:0; color:var(--text-secondary); cursor:pointer; }
  .pw-toggle:hover{ color:var(--accent-gold); }
  .pw-toggle .icon-eye-off{ display:none; }
  .pw-toggle.showing .icon-eye{ display:none; }
  .pw-toggle.showing .icon-eye-off{ display:block; }
  a{ color:var(--accent-gold); }
</style>
</head>
<body>

<div class="login-wrap" id="wrap">
  <h1>🔑 Reset Password</h1>
  <div id="formArea">
    <div class="sub">Choose a new password for your admin account.</div>
    <div class="err" id="errMsg"></div>
    <label>New Password</label>
    <div class="pw-wrap">
      <input type="password" id="newPass" autocomplete="new-password">
      <button type="button" class="pw-toggle" data-for="newPass" title="Show password" aria-label="Show password">
        <svg class="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
        <svg class="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M10.6 5.1A11 11 0 0 1 12 5c7 0 11 7 11 7a13.5 13.5 0 0 1-3.2 3.9M6.5 6.6C3.4 8.5 1 12 1 12s4 7 11 7a10.4 10.4 0 0 0 4.2-.9M9.9 9.9a3 3 0 0 0 4.2 4.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <label>Confirm New Password</label>
    <div class="pw-wrap">
      <input type="password" id="confirmPass" autocomplete="new-password">
      <button type="button" class="pw-toggle" data-for="confirmPass" title="Show password" aria-label="Show password">
        <svg class="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
        <svg class="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M10.6 5.1A11 11 0 0 1 12 5c7 0 11 7 11 7a13.5 13.5 0 0 1-3.2 3.9M6.5 6.6C3.4 8.5 1 12 1 12s4 7 11 7a10.4 10.4 0 0 0 4.2-.9M9.9 9.9a3 3 0 0 0 4.2 4.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <button class="btn-gold" id="submitBtn">Reset Password</button>
  </div>
  <div id="successArea" style="display:none;">
    <p class="ok">✅ Your password has been reset.</p>
    <p class="sub" style="margin-top:10px;"><a href="/admin/">Go to login</a></p>
  </div>
</div>

<script>
function showErr(msg){
  const el = document.getElementById('errMsg');
  el.textContent = msg; el.style.display = msg ? 'block' : 'none';
}

document.querySelectorAll('.pw-toggle').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const input = document.getElementById(btn.dataset.for);
    const showing = btn.classList.toggle('showing');
    input.type = showing ? 'text' : 'password';
  });
});

const token = new URLSearchParams(window.location.search).get('token');
if (!token) {
  document.getElementById('formArea').style.display = 'none';
  document.getElementById('successArea').style.display = 'none';
  document.getElementById('wrap').insertAdjacentHTML('beforeend', '<p class="err" style="display:block;">This link is missing its reset token. Use the link from your email exactly as sent.</p>');
}

document.getElementById('submitBtn').addEventListener('click', async ()=>{
  showErr('');
  const newPassword = document.getElementById('newPass').value;
  const confirmPassword = document.getElementById('confirmPass').value;
  if (!newPassword || newPassword.length < 6){ showErr('Password must be at least 6 characters'); return; }
  if (newPassword !== confirmPassword){ showErr('Passwords do not match'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Resetting...';
  try{
    const res = await fetch('/api/admin/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, newPassword })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Could not reset password');
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('successArea').style.display = 'block';
  }catch(e){
    showErr(e.message);
    btn.disabled = false; btn.textContent = 'Reset Password';
  }
});
</script>
</body>
</html>
